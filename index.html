<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 照片编辑器</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; background: #f5f5f7; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 12px; background: #007AFF; color: white; font-size: 16px; margin: 8px 0; }
        textarea, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #e5e5ea; border-radius: 12px; margin: 8px 0; font-size: 16px; }
        img { max-width: 100%; border-radius: 12px; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🤖 AI 照片编辑器</h1>
        <input type="file" id="imageInput" accept="image/*">
        <textarea id="prompt" rows="2" placeholder="输入你想要的效果，例如：高清，蓝天，人像美白"></textarea>
        <button onclick="editImage()">✨ AI 编辑图片</button>
    </div>
    <div class="card">
        <h3>原图</h3>
        <div id="originalImage"></div>
    </div>
    <div class="card">
        <h3>AI 处理后</h3>
        <div id="resultImage"></div>
    </div>

    <script>
        // 你的 Replicate API Token 已填入
        const REPLICATE_API_TOKEN = 'r8_EL0jRe8ca46tq8zkvi6wGMb5bVa4FMy45bWDB';

        async function editImage() {
            const file = document.getElementById('imageInput').files[0];
            const prompt = document.getElementById('prompt').value;
            
            if (!file || !prompt) {
                alert('请先上传图片并输入提示词！');
                return;
            }

            // 显示原图
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('originalImage').innerHTML = `<img src="${e.target.result}">`;
            };
            reader.readAsDataURL(file);

            try {
                // 调用 Replicate API
                const response = await fetch('https://api.replicate.com/v1/predictions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Token ${REPLICATE_API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        version: "a1564e1fa1b72e86c056204392f94217e512d2d26fc1c6a5a602e6a2ee720aee",
                        input: {
                            image: await fileToDataURL(file),
                            prompt: prompt,
                            strength: 0.3
                        }
                    })
                });

                const data = await response.json();
                
                // 轮询获取结果
                let prediction = data;
                while (prediction.status !== 'succeeded' && prediction.status !== 'failed') {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    const res = await fetch(prediction.urls.get, {
                        headers: { 'Authorization': `Token ${REPLICATE_API_TOKEN}` }
                    });
                    prediction = await res.json();
                }

                if (prediction.status === 'succeeded') {
                    document.getElementById('resultImage').innerHTML = `<img src="${prediction.output[0]}">`;
                } else {
                    alert('AI 处理失败，请重试！');
                }
            } catch (error) {
                alert('网络错误，请检查网络后重试！');
                console.error(error);
            }
        }

        function fileToDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
