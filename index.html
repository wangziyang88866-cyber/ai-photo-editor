<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 照片编辑器</title>
<style>
* { box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    max-width: 500px;
    margin: 0 auto;
    padding: 20px;
    background: #f5f5f7;
}
.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #007AFF;
    color: white;
    font-size: 16px;
    margin: 8px 0;
    cursor: pointer;
}
textarea, input[type="file"] {
    width: 100%;
    padding: 12px;
    border: 1px solid #e5e5ea;
    border-radius: 12px;
    margin: 8px 0;
    font-size: 16px;
}
img {
    max-width: 100%;
    border-radius: 12px;
    margin-top: 12px;
}
.loading {
    text-align: center;
    color: #666;
}
</style>
</head>
<body>

<div class="card">
    <h1>🤖 AI 照片编辑器</h1>
    <input type="file" id="imageInput" accept="image/*">
    <textarea id="prompt" rows="2" placeholder="输入你想要的效果，例如：高清，蓝天，人像美白"></textarea>
    <button id="editBtn">✨ AI 编辑图片</button>
</div>

<div class="card">
    <h3>原图</h3>
    <div id="originalImage"></div>
</div>

<div class="card">
    <h3>AI 处理后</h3>
    <div id="resultImage"></div>
</div>

<!-- 加载 Replicate SDK -->
<script src="https://cdn.jsdelivr.net/npm/replicate-js@latest/dist/replicate.min.js"></script>

<script>
window.addEventListener("load", () => {
    if (typeof Replicate === "undefined") {
        alert("Replicate SDK 加载失败，请检查网络！");
        return;
    }

    // ⚠️ 个人使用，可以直接写 token
    const replicate = new Replicate({ token: "r8_HbGeaRUr8XWWu78dGq9WEjUD9WldvQM0kOlNG" }); // <-- 替换为你的 Replicate API token

    const editBtn = document.getElementById("editBtn");
    const resultDiv = document.getElementById("resultImage");

    editBtn.addEventListener("click", async () => {
        const file = document.getElementById("imageInput").files[0];
        const prompt = document.getElementById("prompt").value;

        if (!file || !prompt) {
            alert("请先上传图片并输入提示词！");
            return;
        }

        // 显示原图
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById("originalImage").innerHTML = `<img src="${e.target.result}">`;
        };
        reader.readAsDataURL(file);

        resultDiv.innerHTML = '<div class="loading">AI 正在处理中，请稍候...</div>';

        try {
            // 转 Base64
            const base64Image = await new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = e => resolve(e.target.result);
                r.onerror = reject;
                r.readAsDataURL(file);
            });

            // 调用 Replicate API
            const output = await replicate.run(
                "stability-ai/stable-diffusion-img2img-ultra",
                { input: { image: base64Image, prompt, strength: 0.3 } }
            );

            if (Array.isArray(output) && output.length > 0) {
                resultDiv.innerHTML = `<img src="${output[0]}">`;
            } else {
                resultDiv.innerHTML = '<div class="loading">AI 处理失败，请重试</div>';
            }

        } catch (err) {
            console.error(err);
            resultDiv.innerHTML = `<div class="loading">出错：${err.message}</div>`;
        }
    });
});
</script>

</body>
</html>

</body>
</html>
